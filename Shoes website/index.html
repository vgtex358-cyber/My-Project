<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoes Shop Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <section class="image-section">
        <aside>
          <img src="./assets/side_image1.png" alt="side_image1" />
          <img src="./assets/side_image2.png" alt="side_image2" />
          <img src="./assets/side_image3.png" alt="side_image3" />
          <img src="./assets/side_image4.png" alt="side_image4" />
          <img src="./assets/side_image5.png" alt="side_image5" />
          <img src="./assets/side_image6.png" alt="side_image6" />
        </aside>
        <div class="center-image">
          <img src="./assets/center_image.png" alt="center-image" />
        </div>
      </section>

      <section class="content">
        <div class="heading">
          <h2 class="green-text">Sustainable Materials</h2>
          <h1>NIke Revolution 8</h1>
          <p>Men’s Road Running Shoes</p>
        </div>
        <div class="price">
          <h2>MRP - $0.00</h2>
          <div>
            <p>Inclusive of all taxes</p>
            <p>Also includes all applicable duties</p>
          </div>
        </div>
        <div class="variants">
            <img src="./assets/variant1.png" class="variant variant1" >
            <img src="./assets/variant2.png" class="variant variant2" >
            <img src="./assets/variant3.png" class="variant variant3" >
            <img src="./assets/variant4.png" class="variant variant4" >
        </div>
        <div class="size-section">
          <div class="heading-size">
            <h3>Select Size</h3>            
            <h3> Size Guide</h3>            
          </div>
          <div class="size-variants">
            <h3 class="size-variant-box">UK 6</h3>
            <h3 class="size-variant-box">UK 6.6</h3>
            <h3 class="size-variant-box">Uk 7</h3>
            <h3 class="size-variant-box">Uk 7</h3>
          </div>
        </div>
        <div class="btn-section">
          <button>Add to Bag</button>
          <button>Favourite</button>
        </div>
      </section>
    </div>
  </body>
</html>
